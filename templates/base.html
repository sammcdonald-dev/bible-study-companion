{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Bible Study Companion{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,300;1,400&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'studies/css/main.css' %}">
    {% block extra_head %}{% endblock %}
</head>
<body>

    <header class="site-header">
        <div class="container">
            <a href="/read/" class="site-logo">Bible Study Companion</a>
            <nav class="site-nav">
                <a href="/read/">Books</a>
            </nav>
        </div>
    </header>

    <main class="site-main">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>Scripture taken from the NIV.</p>
        </div>
    </footer>

</body>
</html>
